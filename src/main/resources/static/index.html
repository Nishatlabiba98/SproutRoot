<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SproutRoot 🌱</title>
  <link rel="stylesheet" href="/css/main.css"/>
</head>
<body>

  <div id="screen-menu" class="screen active">
    <div class="bar bar-red">
      <span class="logo">🌱 SproutRoot</span>
      <div class="child-chip">
        <div class="av">N</div>
        <span>Nishan</span>
      </div>
    </div>
    <div class="menu-body">
      <div class="menu-title">What do you want to learn?</div>
      <div class="menu-sub">Pick a game to play!</div>
      <div class="game-grid">

        <button class="bubble" id="btn-sound-safari" style="background:#1A7CE8">
          <svg width="60" height="52" viewBox="0 0 70 60">
            <rect x="4" y="4" width="28" height="28" rx="6" fill="white" stroke="#0D4FA0" stroke-width="2.5"/>
            <text x="18" y="25" font-size="18" font-weight="900" fill="#1A7CE8" text-anchor="middle" font-family="Arial">A</text>
            <rect x="38" y="4" width="28" height="28" rx="6" fill="#85B7EB" stroke="#0D4FA0" stroke-width="2.5"/>
            <text x="52" y="25" font-size="18" font-weight="900" fill="white" text-anchor="middle" font-family="Arial">B</text>
          </svg>
          <div class="bubble-name">Sound Safari</div>
          <div class="bubble-tag">Letters &amp; Sounds</div>
        </button>

        <button class="bubble" id="btn-berry-basket" style="background:#F07820">
          <svg width="60" height="52" viewBox="0 0 70 60">
            <circle cx="25" cy="20" r="8" fill="#E83020" stroke="#8A1A10" stroke-width="2"/>
            <circle cx="35" cy="14" r="8" fill="#E83020" stroke="#8A1A10" stroke-width="2"/>
            <circle cx="45" cy="20" r="8" fill="#E83020" stroke="#8A1A10" stroke-width="2"/>
            <rect x="14" y="34" width="42" height="18" rx="5" fill="#A0522D" stroke="#5A2D00" stroke-width="2"/>
          </svg>
          <div class="bubble-name">Berry Basket</div>
          <div class="bubble-tag">Numbers &amp; Counting</div>
        </button>

        <button class="bubble" id="btn-shape-village" style="background:#8830E8">
          <svg width="60" height="52" viewBox="0 0 70 60">
            <circle cx="20" cy="28" r="14" fill="white" stroke="#4A1A88" stroke-width="2.5"/>
            <rect x="38" y="14" width="26" height="26" rx="4" fill="#C0A0F8" stroke="#4A1A88" stroke-width="2.5"/>
            <polygon points="12,56 32,30 52,56" fill="#5810B0" stroke="#4A1A88" stroke-width="2.5"/>
          </svg>
          <div class="bubble-name">Shape Village</div>
          <div class="bubble-tag">Shapes &amp; Colors</div>
        </button>

        <button class="bubble" id="btn-sorting-tray" style="background:#00A651">
          <svg width="60" height="52" viewBox="0 0 70 60">
            <rect x="2" y="4" width="30" height="20" rx="5" fill="#F5C800" stroke="#7A6000" stroke-width="2"/>
            <text x="17" y="18" font-size="10" font-weight="900" fill="#7A6000" text-anchor="middle" font-family="Arial">Animals</text>
            <rect x="38" y="4" width="30" height="20" rx="5" fill="#1A7CE8" stroke="#0D4FA0" stroke-width="2"/>
            <text x="53" y="18" font-size="10" font-weight="900" fill="white" text-anchor="middle" font-family="Arial">Vehicles</text>
          </svg>
          <div class="bubble-name">Sorting Tray</div>
          <div class="bubble-tag">Critical Thinking</div>
        </button>

      </div>
      <div class="streak-bar">
        <span class="streak-fire">🔥</span>
        <div>
          <div class="streak-label">Keep learning every day!</div>
          <div class="streak-sub">You're doing amazing, Nishan!</div>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-game" class="screen">
    <div class="bar" id="game-bar">
      <span class="logo" id="game-title">Game</span>
      <div class="child-chip">
        <div class="av">N</div>
        <span>Nishan</span>
      </div>
    </div>
    <div class="game-body" id="game-body">
      <div class="prog-row">
        <span id="q-count">Question 1 of 5</span>
        <span class="score-pill" id="score-display">Score: 0</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="q-card">
        <div class="q-anim" id="q-anim"></div>
        <div class="q-hint" id="q-hint"></div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback" style="display:none"></div>
    </div>
  </div>

  <div id="screen-complete" class="screen">
    <div class="bar bar-green">
      <span class="logo">🌱 SproutRoot</span>
    </div>
    <div class="complete-body">
      <div class="complete-emoji">⭐</div>
      <div class="complete-title">Amazing job, Nishan!</div>
      <div class="complete-score" id="complete-score">You scored 50 points!</div>
      <div class="activity-card" id="activity-card" style="display:none">
        <div class="activity-header">🌿 Try this at home!</div>
        <div class="activity-emoji" id="activity-emoji"></div>
        <div class="activity-title" id="activity-title"></div>
        <div class="activity-desc" id="activity-desc"></div>
        <div class="activity-materials">
          <span>🧺 You need: </span>
          <span id="activity-materials"></span>
        </div>
      </div>
      <button class="big-btn green-btn" id="btn-play-again">Play Again!</button>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
